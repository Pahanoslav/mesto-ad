<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesto — место для ваших фотографий</title>
    <link rel="stylesheet" href="./src/styles/index.css" />
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header">
        <p class="header__logo">Mesto</p>
      </header>

      <main class="content">
        <section class="profile" aria-label="Профиль пользователя">
          <div class="profile__avatar-container">
            <img class="profile__image" src="" alt="Аватар пользователя" />
            <button
              type="button"
              class="profile__avatar-edit-button"
              aria-label="Редактировать аватар"
            >
              <img
                src="./src/images/icons/edit.svg"
                class="profile__avatar-edit-icon"
                alt=""
              />
            </button>
          </div>
          <div class="profile__info">
            <h1 class="profile__title"></h1>
            <button
              type="button"
              class="profile__edit-button"
              aria-label="Редактировать профиль"
            >
              <img
                src="./src/images/icons/edit.svg"
                class="profile__edit-icon"
                alt=""
              />
            </button>
            <p class="profile__description"></p>
          </div>
          <button
            type="button"
            class="profile__add-button"
            aria-label="Добавить карточку"
          >
            <img
              src="./src/images/icons/plus.svg"
              class="profile__add-icon"
              alt=""
            />
          </button>
        </section>

        <section class="places" aria-label="Карточки мест">
          <ul class="places__list"></ul>
        </section>
      </main>
    </div>

    <!-- Попап редактирования профиля -->
    <div class="popup popup_type_edit">
      <div class="popup__container">
        <button
          type="button"
          class="popup__close"
          aria-label="Закрыть"
        ></button>
        <h2 class="popup__title">Редактировать профиль</h2>
        <form
          class="popup__form"
          name="edit-profile"
          novalidate
        >
          <input
            type="text"
            class="popup__input popup__input_type_name"
            name="name"
            placeholder="Имя"
            required
            minlength="2"
            maxlength="40"
            pattern="^[a-zA-Zа-яёА-ЯЁ\s\-]+$"
            data-error-message="Разрешены только латинские, кириллические буквы, дефис и пробел"
          />
          <span class="popup__error name-error"></span>
          <input
            type="text"
            class="popup__input popup__input_type_description"
            name="description"
            placeholder="О себе"
            required
            minlength="2"
            maxlength="200"
          />
          <span class="popup__error description-error"></span>
          <button
            type="submit"
            class="popup__button popup__button_disabled"
            disabled
          >
            Сохранить
          </button>
        </form>
      </div>
    </div>

    <!-- Попап добавления новой карточки -->
    <div class="popup popup_type_new-card">
      <div class="popup__container">
        <button
          type="button"
          class="popup__close"
          aria-label="Закрыть"
        ></button>
        <h2 class="popup__title">Новое место</h2>
        <form
          class="popup__form"
          name="new-place"
          novalidate
        >
          <input
            type="text"
            class="popup__input popup__input_type_card-name"
            name="place-name"
            placeholder="Название"
            required
            minlength="2"
            maxlength="30"
            pattern="^[a-zA-Zа-яёА-ЯЁ\s\-]+$"
            data-error-message="Разрешены только латинские, кириллические буквы, дефис и пробел"
          />
          <span class="popup__error place-name-error"></span>
          <input
            type="url"
            class="popup__input popup__input_type_url"
            name="link"
            placeholder="Ссылка на картинку"
            required
          />
          <span class="popup__error link-error"></span>
          <button
            type="submit"
            class="popup__button popup__button_disabled"
            disabled
          >
            Создать
          </button>
        </form>
      </div>
    </div>

    <!-- Попап обновления аватара -->
    <div class="popup popup_type_avatar">
      <div class="popup__container">
        <button
          type="button"
          class="popup__close"
          aria-label="Закрыть"
        ></button>
        <h2 class="popup__title">Обновить аватар</h2>
        <form
          class="popup__form"
          name="new-avatar"
          novalidate
        >
          <input
            type="url"
            class="popup__input popup__input_type_avatar"
            name="avatar"
            placeholder="Ссылка на картинку"
            required
          />
          <span class="popup__error avatar-error"></span>
          <button
            type="submit"
            class="popup__button popup__button_disabled"
            disabled
          >
            Сохранить
          </button>
        </form>
      </div>
    </div>

    <!-- Попап подтверждения удаления карточки -->
    <div class="popup popup_type_remove-card">
      <div class="popup__container">
        <button
          type="button"
          class="popup__close"
          aria-label="Закрыть"
        ></button>
        <h2 class="popup__title">Вы уверены?</h2>
        <form class="popup__form" name="remove-card" novalidate>
          <button type="submit" class="popup__button">Да</button>
        </form>
      </div>
    </div>

    <!-- Попап с увеличенным изображением карточки -->
    <div class="popup popup_type_image">
      <div class="popup__container popup__container_type_image">
        <button
          type="button"
          class="popup__close"
          aria-label="Закрыть"
        ></button>
        <img class="popup__image" src="" alt="" />
        <p class="popup__caption"></p>
      </div>
    </div>

    <!-- Попап информации о карточке -->
    <div class="popup popup_type_info">
      <div class="popup__container">
        <button
          type="button"
          class="popup__close"
          aria-label="Закрыть"
        ></button>
        <h2 class="popup__title">Информация о карточке</h2>
        <dl class="popup__info-list"></dl>
        <h3 class="popup__subtitle">Лайкнули:</h3>
        <ul class="popup__users-list"></ul>
      </div>
    </div>

    <!-- Шаблон карточки -->
    <template id="card-template">
      <li class="card">
        <button
          type="button"
          class="card__info-button"
          aria-label="Информация о карточке"
        >
          <img
            src="./src/images/icons/info.svg"
            class="card__info-icon"
            alt=""
          />
        </button>
        <button
          type="button"
          class="card__delete-button"
          aria-label="Удалить карточку"
        >
          <img
            src="./src/images/icons/trash.svg"
            class="card__delete-icon"
            alt=""
          />
        </button>
        <img class="card__image" src="" alt="" />
        <div class="card__info">
          <h2 class="card__title"></h2>
          <div class="card__like-container">
            <button
              type="button"
              class="card__like-button"
              aria-label="Поставить лайк"
            >
              <svg
                class="card__like-icon"
                width="22"
                height="20"
                viewBox="0 0 22 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  class="card__like-icon-path"
                  d="M11 19C11 19 1 13.5 1 6.85714C1 3.6 3.5 1 6.5 1C8.5 1 10 2 11 3.5C12 2 13.5 1 15.5 1C18.5 1 21 3.6 21 6.85714C21 13.5 11 19 11 19Z"
                />
              </svg>
            </button>
            <p class="card__like-count">0</p>
          </div>
        </div>
      </li>
    </template>

    <!-- Шаблон строки информации (попап информации о карточке) -->
    <template id="popup-info-definition-template">
      <div class="popup__info-item">
        <dt class="popup__info-term"></dt>
        <dd class="popup__info-value"></dd>
      </div>
    </template>

    <!-- Шаблон карточки пользователя в списке лайкнувших -->
    <template id="popup-info-user-preview-template">
      <li class="popup__user-item">
        <p class="popup__user-name"></p>
      </li>
    </template>

    <script type="module" src="./src/scripts/index.js"></script>
  </body>
</html>
